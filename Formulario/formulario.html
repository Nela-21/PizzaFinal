 <h1>Formulario Del Usuario</h1>
    <div class="contenedor-principal">
       
        <form action="/index.html">
            <br><br>
            <label for=nombre>Ingresar su Nombre:</label>
            <input type="text" placeholder="Nombre completo" required>
            <br><br>
            <label for="apellido">Ingresar Apellido:</label>
            <input type="text" placeholder="apellido completo" required>
            <br><br>
            <label for="telefono">Ingresar Numero Telefonico:</label>
            <input type="number" id="telefono" placeholder="telefono" required>
            <br><br>
            <label for="cedula">Ingresar numero de Cedula:</label>
            <input type="number" id="cedula" placeholder="cedula" required>
            <br><br>
            <label for="direccion">Ingresar su dirreccion:</label>
            <input type="text" id="direccion" placeholder="direccion" required>
            <br><br>
            <label for="gmail">Ingresar Correo Electronico:</label>
            <input type="email" id="gmail" placeholder="correo Electronico" required>
            <br><br>
            <label for="fin">Finalizar Encuesta</label>
            <button type="submit">Enviar</button>
        </form>
        <a href="/index.html">Ir al inicio</a>
    </div>
